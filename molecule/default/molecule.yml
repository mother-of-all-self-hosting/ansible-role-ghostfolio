---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: ghostfolio-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Variables for Ghostfolio
        ghostfolio_uid: 1000
        ghostfolio_gid: 1000
        ghostfolio_hostname: ghostfolio
        ghostfolio_container_labels_traefik_enabled: false
        ghostfolio_container_http_host_bind_port: 3333
        ghostfolio_environment_variable_access_token_salt: salt
        ghostfolio_environment_variable_jwt_secret_key: secret

        # Variables required for Ghostfolio to connect to the Postgres database (via Unix socket)
        ghostfolio_database_username: my_database_username
        ghostfolio_database_password: my_database_password
        ghostfolio_database_sslmode: disable
        ghostfolio_database_name: ghostfolio
        ghostfolio_database_socket_enabled: true
        ghostfolio_database_socket_path_host: "{{ postgres_run_path }}"
        ghostfolio_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}

        # Variables required for Ghostfolio to connect to the Valkey data-store
        ghostfolio_redis_hostname: "{{ valkey_identifier }}"
        ghostfolio_container_additional_networks_custom:
          - "{{ valkey_container_network }}"
        ghostfolio_systemd_required_services_list_custom:
          - "{{ valkey_identifier }}.service"

        # Variables for Postgres
        postgres_uid: 1000
        postgres_gid: 1000
        postgres_connection_password: postgres_password
        postgres_container_unix_socket_enabled: true
        postgres_managed_databases: |
          {{
            [{
              'name': ghostfolio_database_name,
              'username': ghostfolio_database_username,
              'password': ghostfolio_database_password,
            }]
          }}

        # Variables for Valkey
        valkey_uid: 1000
        valkey_gid: 1000
        valkey_arch: amd64
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-postgres
    # - idempotence
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
